<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SmartKart | Welcome</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }



        body, html {

            height: 100%;

            width: 100%;

            font-family: 'Poppins', sans-serif;

            display: flex;

            justify-content: center;

            align-items: center;

           

            /* 1. Back-up Color (Agar image load na ho) */

            background-color: #1a1a1a;

           

            /* 2. High-Quality Pizza & Drinks Background */

            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)),

                              url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=1600&q=80');

           

            background-size: cover;

            background-position: center;

            background-repeat: no-repeat;

            background-attachment: fixed;

        }



        .welcome-card {

            background: rgba(255, 255, 255, 0.95);

            padding: 50px 40px;

            border-radius: 30px;

            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);

            text-align: center;

            width: 90%;

            max-width: 420px;

            backdrop-filter: blur(10px);

            border: 1px solid rgba(255, 255, 255, 0.2);

            animation: fadeIn 0.8s ease-out;

        }



        @keyframes fadeIn {

            from { opacity: 0; transform: translateY(30px); }

            to { opacity: 1; transform: translateY(0); }

        }



        .logo-text {

            color: #e63946;

            font-size: 42px;

            font-weight: 700;

            letter-spacing: -1.5px;

            display: block;

            margin-bottom: 20px;

        }



        h2 {

            color: #1d3557;

            font-size: 19px;

            font-weight: 400;

            margin-bottom: 35px;

            line-height: 1.5;

        }



        h2 strong { color: #e63946; font-weight: 600; }



        input {

            width: 100%;

            padding: 18px 20px;

            border: 2px solid #ddd;

            border-radius: 15px;

            outline: none;

            font-size: 16px;

            text-align: center;

            margin-bottom: 25px;

            transition: 0.3s;

        }



        input:focus { border-color: #e63946; box-shadow: 0 0 15px rgba(230, 57, 70, 0.1); }



        .explore-btn {

            background: #e63946;

            color: white;

            border: none;

            padding: 18px;

            border-radius: 15px;

            font-size: 18px;

            font-weight: 600;

            cursor: pointer;

            width: 100%;

            transition: 0.3s;

            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.3);

        }



        .explore-btn:hover {

            background: #1d3557;

            transform: translateY(-3px);

        }

    </style>

</head>

<body>



    <div class="welcome-card">

        <span class="logo-text">SmartKart 🛒</span>

       

        <h2>Craving something delicious?<br><strong>Tell us your name to begin:</strong></h2>

       

        <input type="text" id="userName" placeholder="Type your name..." autocomplete="off">

       

        <button class="explore-btn" onclick="startApp()">Let's Explore!!</button>

    </div>



    <script>

        function startApp() {

            const name = document.getElementById('userName').value.trim();

            if (name !== "") {

                localStorage.setItem('visitorName', name);

                window.location.href = 'dashboard.html';

            } else {

                alert("Please enter your name to explore!");

            }

        }



        // Enter key support

        document.getElementById('userName').addEventListener('keypress', (e) => {

            if (e.key === 'Enter') startApp();

        });

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YumYard | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e63946; --dark: #1d3557; --bg: #f8f9fa; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); padding: 30px; }
        .admin-container { max-width: 900px; margin: 0 auto; }
        .glass-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid #eee; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        input, select { padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; }
        .admin-btn { background: var(--red); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 15px; }
        .admin-btn:hover { background: var(--dark); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--dark); color: white; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="admin-container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Admin Panel 🔐</h1>
            <button class="admin-btn" style="width:auto;" onclick="window.location.href='dashboard.html'">Go to Menu →</button>
        </div>

        <div class="stats">
            <div class="stat-box"><h4>Orders</h4><h2 id="total-orders">0</h2></div>
            <div class="stat-box"><h4>Revenue</h4><h2>₹<span id="total-rev">0</span></h2></div>
        </div>

        <div class="glass-card">
            <h3>Add New Dish</h3>
            <div class="input-group">
                <input type="text" id="pName" placeholder="Dish Name">
                <input type="number" id="pPrice" placeholder="Price (₹)">
                <select id="pCat">
                    <option value="pizza">Pizza 🍕</option>
                    <option value="fruits">Fruits 🍎</option>
                    <option value="drinks">Drinks 🥤</option>
                    <option value="others">Others 🍰</option>
                </select>
                <input type="text" id="pImg" placeholder="Image URL (e.g. img/new.jpg)">
            </div>
            <button class="admin-btn" onclick="addNewItem()">Add to SmartKart</button>
        </div>

        <div class="glass-card">
            <h3>Recent Orders</h3>
            <table>
                <thead>
                    <tr><th>ID</th><th>Items</th><th>Total</th><th>Status</th></tr>
                </thead>
                <tbody id="admin-history"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Load Orders & Revenue
        function loadData() {
            const history = JSON.parse(localStorage.getItem('orderHistory')) || [];
            const historyTable = document.getElementById('admin-history');
            let rev = 0;
            document.getElementById('total-orders').innerText = history.length;
            
            historyTable.innerHTML = history.map(o => {
                rev += parseFloat(o.total);
                return `<tr><td>${o.id}</td><td>${o.items}</td><td>₹${o.total}</td><td style="color:green">Paid</td></tr>`;
            }).join('') || '<tr><td colspan="4">No orders yet</td></tr>';
            
            document.getElementById('total-rev').innerText = rev;
        }

        // Add Item Logic
        function addNewItem() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const cat = document.getElementById('pCat').value;
            const img = document.getElementById('pImg').value || "https://via.placeholder.com/150";

            if(!name || !price) return alert("Details bharo pehle!");

            let menu = JSON.parse(localStorage.getItem('myMenu'));
            
            const newItem = {
                id: Date.now(),
                name: name,
                price: parseInt(price),
                type: "veg", 
                cat: cat,
                img: img
            };

            menu.push(newItem);
            localStorage.setItem('myMenu', JSON.stringify(menu));
            
            alert(name + " add ho gaya! Dashboard check karo.");
            location.reload();
        }

        loadData();
    </script>
</body>
</html>

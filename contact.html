<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Feedback | YumYard SmartKart</title>
    <style>
        /* Base Styles - Pure, clean layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif; /* A modern font */
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e1e1e, #333333); /* Subtle dark gradient bg */
            color: #fff;
            padding: 20px;
        }

        /* Essential Glassmorphism Container */
        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
            overflow: hidden; /* Clean borders */
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #fff;
        }

        p.subtitle {
            font-size: 1rem;
            margin-bottom: 30px;
            color: #ddd;
        }

        /* Feedback Form Layout */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Spaces between form elements */
        }

        .input-group {
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #eee;
        }

        /* Styles for Inputs, Select, Textarea */
        select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
            font-size: 1rem;
            transition: 0.3s;
        }

        select:focus, textarea:focus {
            outline: 2px solid #ff4757; /* Highlight on focus */
            background: #fff;
        }

        textarea {
            resize: none; /* User can't resize it */
        }

        /* Submit Button with Hover Effect */
        .btn-submit {
            background: #ff4757; /* A vibrant red */
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #ff6b81; /* Lighter red on hover */
            transform: translateY(-2px); /* Slight lift */
        }

        /* Direct WhatsApp Contact Section */
        .direct-contact {
            margin-top: 30px;
            font-size: 0.95rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .direct-contact strong {
            color: #ff4757;
            font-size: 1.1rem;
        }

        /* Floating WhatsApp Icon (Bonus!) */
        .whatsapp-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25D366; /* WhatsApp Green */
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.3s;
            z-index: 1000;
        }

        .whatsapp-icon:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    
    <div class="glass-container">
        <h2>Help & Feedback</h2>
        <p class="subtitle">Facing issues with Add to Cart? Let us know!</p>
        
        <form class="contact-form">
            <div class="input-group">
                <label>Issue Category</label>
                <select id="issue-select">
                    <option>Select Issue...</option>
                    <option>Cart not updating</option>
                    <option>Payment Issue</option>
                    <option>Login Problem</option>
                    <option>Other</option>
                </select>
            </div>
            
            <textarea id="feedback-text" placeholder="Describe your problem here..." rows="6"></textarea>
            <button type="submit" class="btn-submit">Submit Feedback</button>
        </form>

        <div class="direct-contact">
            <p>Or WhatsApp us directly at: <strong>+91 98765 43210</strong></p>
        </div>
    </div>

    <a href="https://wa.me/919876543210" target="_blank" class="whatsapp-icon" title="Chat with Us">
        💬
    </a>

</body>
</html>

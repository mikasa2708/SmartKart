<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Feedback | YumYard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            /* Bright & Fresh Background */
            background: linear-gradient(135deg, #f0f4f8, #d9e2ec); color: #333; padding: 20px;
        }
        .glass-container {
            /* White Glassmorphism */
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 30px;
            padding: 40px; width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }
        h2 { color: #e63946; font-size: 28px; margin-bottom: 10px; }
        p { color: #555; margin-bottom: 20px; }

        .contact-form { display: flex; flex-direction: column; gap: 15px; }
        select, textarea {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #ddd;
            background: #fff; color: #333; font-size: 1rem; outline: none; transition: 0.3s;
        }
        select:focus, textarea:focus { border-color: #e63946; box-shadow: 0 0 10px rgba(230, 57, 70, 0.1); }

        .btn-submit {
            background: #e63946; color: white; border: none; padding: 15px;
            border-radius: 15px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-submit:hover { background: #1d3557; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(230, 57, 70, 0.3); }

        .thanks-msg { display: none; padding: 20px; }
        .thanks-msg h3 { color: #2d6a4f; font-size: 24px; margin-bottom: 10px; }
        .back-btn { 
            margin-top: 20px; display: inline-block; color: #e63946; 
            text-decoration: none; border: 2px solid #e63946; padding: 10px 25px; 
            border-radius: 12px; font-weight: 600; transition: 0.3s;
        }
        .back-btn:hover { background: #e63946; color: #fff; }
    </style>
</head>
<body>
    <div class="glass-container">
        <div id="form-section">
            <h2>Help & Feedback</h2>
            <p>Share your experience or report an issue with us.</p>
            <form class="contact-form" onsubmit="sendFeedback(event)">
                <select id="issue-type" required>
                    <option value="">Select Issue Category</option>
                    <option>Cart not updating</option>
                    <option>Dish images not loading</option>
                    <option>Payment/Login Problem</option>
                    <option>General Feedback</option>
                </select>
                <textarea id="feedback-desc" placeholder="How can we help you?" rows="4" required></textarea>
                <button type="submit" class="btn-submit">Send Message</button>
            </form>
            <a href="dashboard.html" style="display:block; margin-top:15px; color:#888; text-decoration:none; font-size:14px;">← Back to Menu</a>
        </div>

        <div id="thanks-section" class="thanks-msg">
            <h3>❤️ Received!</h3>
            <p>Thank you for reaching out. We will fix the issue ASAP to make SmartKart better for you.</p>
            <a href="dashboard.html" class="back-btn">Go Back</a>
        </div>
    </div>

    <script>
        function sendFeedback(event) {
            event.preventDefault();
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('thanks-section').style.display = 'block';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YumYard | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e63946; --dark: #1d3557; --bg: #f0f4f8; --card: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 30px; color: var(--dark); }
        
        .admin-container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px;
        }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select { padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-family: 'Poppins'; }
        
        /* Your Favorite Capsule Style */
        .admin-btn {
            background: var(--red); color: white; border: none; padding: 12px 25px;
            border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px; font-size: 13px;
        }
        .admin-btn:hover { background: var(--dark); transform: translateY(-2px); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--red); }
        .stat-box h3 { margin: 0; font-size: 24px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--dark); color: white; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header">
            <h1>Admin Dashboard 🔐</h1>
            <button class="admin-btn" onclick="window.location.href='dashboard.html'">View Store</button>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><p>Total Orders</p><h3 id="total-orders">0</h3></div>
            <div class="stat-box"><p>Total Revenue</p><h3>₹<span id="total-rev">0</span></h3></div>
            <div class="stat-box"><p>Active Menu</p><h3>48 Items</h3></div>
        </div>

        <div class="glass-card">
            <h3>Add New Dish to Menu</h3>
            <div class="input-group">
                <input type="text" id="pName" placeholder="Dish Name">
                <input type="number" id="pPrice" placeholder="Price (₹)">
                <select id="pCat">
                    <option value="pizza">Pizza</option>
                    <option value="fruits">Fruits</option>
                    <option value="drinks">Drinks</option>
                    <option value="others">Desserts</option>
                </select>
                <input type="text" id="pImg" placeholder="Image URL (img/filename.jpg)">
            </div>
            <button class="admin-btn" style="margin-top:15px; width:100%;" onclick="addNewItem()">Add Item</button>
        </div>

        <div class="glass-card">
            <h3>Recent Orders History</h3>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="admin-history">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        function loadAdminData() {
            const history = JSON.parse(localStorage.getItem('orderHistory')) || [];
            const historyTable = document.getElementById('admin-history');
            let revenue = 0;

            document.getElementById('total-orders').innerText = history.length;

            if(history.length === 0) {
                historyTable.innerHTML = '<tr><td colspan="4" style="text-align:center;">No orders received yet.</td></tr>';
            } else {
                historyTable.innerHTML = history.map(order => {
                    revenue += parseFloat(order.total);
                    return `
                        <tr>
                            <td>${order.id}</td>
                            <td>${order.items}</td>
                            <td>₹${order.total}</td>
                            <td style="color:green; font-weight:bold;">Success</td>
                        </tr>
                    `;
                }).join('');
            }
            document.getElementById('total-rev').innerText = revenue;
        }

        function addNewItem() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            if(!name || !price) return alert("Please fill details!");
            
            alert(name + " has been added to the local database! (In a real app, this would save to a server).");
            // Tip: For a real project, you'd push this to a database like Firebase or MongoDB.
        }

        loadAdminData();
    </script>
</body>
</html>
